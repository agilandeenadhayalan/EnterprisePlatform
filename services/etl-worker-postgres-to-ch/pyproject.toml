[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "etl-worker-postgres-to-ch"
version = "0.1.0"
description = "Syncs data from PostgreSQL to ClickHouse using incremental watermarks"
requires-python = ">=3.11"
dependencies = ["mobility-common"]

[tool.hatch.build.targets.wheel]
packages = ["src"]
