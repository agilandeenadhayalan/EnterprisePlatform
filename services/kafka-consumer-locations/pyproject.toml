[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kafka-consumer-locations"
version = "0.1.0"
description = "Archives location events to MinIO Bronze layer as compressed JSON"
requires-python = ">=3.11"
dependencies = ["mobility-common"]

[tool.hatch.build.targets.wheel]
packages = ["src"]
