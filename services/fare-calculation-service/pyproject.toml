[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fare-calculation-service"
version = "0.1.0"
description = "Fare calculation service — detailed fare breakdowns with surge and discounts"
requires-python = ">=3.11"
dependencies = ["mobility-common"]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "httpx>=0.25"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
