[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "etl-scheduler"
version = "0.1.0"
description = "Manages scheduled ETL jobs with cron-like scheduling"
requires-python = ">=3.11"
dependencies = ["mobility-common"]

[tool.hatch.build.targets.wheel]
packages = ["src"]
