[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "feature-store"
version = "0.1.0"
description = "Online/offline feature registry and serving for the ML platform"
requires-python = ">=3.11"
dependencies = ["mobility-common"]

[tool.hatch.build.targets.wheel]
packages = ["src"]
