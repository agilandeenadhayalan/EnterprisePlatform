[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "etl-worker-weather-loader"
version = "0.1.0"
description = "Loads NOAA weather data into ClickHouse dim_weather"
requires-python = ">=3.11"
dependencies = ["mobility-common"]

[tool.hatch.build.targets.wheel]
packages = ["src"]
