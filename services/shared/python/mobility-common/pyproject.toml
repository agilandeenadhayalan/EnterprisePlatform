[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mobility-common"
version = "0.1.0"
description = "Shared models, events, and utilities for Smart Mobility Platform"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[tool.hatch.build.targets.wheel]
packages = ["src/mobility_common"]
