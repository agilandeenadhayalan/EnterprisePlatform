[project]
name = "retraining-trigger-service"
version = "0.1.0"
description = "Drift-based automatic retraining triggers for ML models"
requires-python = ">=3.11"
dependencies = ["mobility-common"]

[tool.hatch.build.targets.wheel]
packages = ["src"]
