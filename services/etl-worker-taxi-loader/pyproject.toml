[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "etl-worker-taxi-loader"
version = "0.1.0"
description = "Loads NYC taxi Parquet files into ClickHouse fact_rides"
requires-python = ">=3.11"
dependencies = ["mobility-common"]

[tool.hatch.build.targets.wheel]
packages = ["src"]
