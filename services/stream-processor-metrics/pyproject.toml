[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "stream-processor-metrics"
version = "0.1.0"
description = "Stream processor for business metrics using tumbling windows — writes to ClickHouse fact_stream_metrics"
requires-python = ">=3.11"
dependencies = ["mobility-common"]

[tool.hatch.build.targets.wheel]
packages = ["src"]
