# ==============================================
# Smart Mobility & Analytics Platform
# Phase 7: Governance, Safety & Resilience Overlay
# ==============================================
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.phase2.yml -f docker-compose.phase3.yml -f docker-compose.phase4.yml -f docker-compose.phase5.yml -f docker-compose.phase6.yml -f docker-compose.phase7.yml up -d
#
# This overlay adds:
#   - ScyllaDB (high-performance wide-column database)
#   - Toxiproxy (network fault injection proxy)
#   - 16 Phase 7 Governance, Safety & Resilience microservices
#
# ==============================================

# -- Shared config for Phase 7 Python services --
x-phase7-python-service: &phase7-python-service
  restart: unless-stopped
  environment: &phase7-python-env
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: mobility_platform
    POSTGRES_USER: mobility
    POSTGRES_PASSWORD: mobility_dev_2024
    REDIS_HOST: redis
    REDIS_PORT: 6379
    JWT_SECRET_KEY: dev-secret-key-change-in-production
    JWT_ALGORITHM: HS256
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    SCHEMA_REGISTRY_URL: http://schema-registry:8081
    CLICKHOUSE_HOST: clickhouse
    CLICKHOUSE_PORT: 8123
    CLICKHOUSE_NATIVE_PORT: 9000
    CLICKHOUSE_DB: mobility_analytics
    CLICKHOUSE_USER: default
    CLICKHOUSE_PASSWORD: ""
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
    MLFLOW_TRACKING_URI: http://mlflow:5000
    MLFLOW_ARTIFACT_ROOT: s3://mlflow-artifacts
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin
    MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    PROMETHEUS_URL: http://prometheus:9090
    GRAFANA_URL: http://grafana:3333
    JAEGER_URL: http://jaeger:16686
    ELASTICSEARCH_URL: http://elasticsearch:9200
    SCYLLADB_HOSTS: scylladb:9042
    TOXIPROXY_URL: http://toxiproxy:8474
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  deploy:
    resources:
      limits:
        memory: 256M

services:

  # ══════════════════════════════════════════════
  # Infrastructure
  # ══════════════════════════════════════════════

  scylladb:
    image: scylladb/scylla:5.4
    container_name: mobility-scylladb
    restart: unless-stopped
    ports:
      - "9042:9042"
    command: --smp 1 --memory 512M --overprovisioned 1
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e \"SELECT now() FROM system.local\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - scylladb-data:/var/lib/scylla
    deploy:
      resources:
        limits:
          memory: 768M

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.8.0
    container_name: mobility-toxiproxy
    restart: unless-stopped
    ports:
      - "8474:8474"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8474/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # ══════════════════════════════════════════════
  # Governance & Compliance Domain (4 services)
  # ══════════════════════════════════════════════

  data-governance-service:
    <<: *phase7-python-service
    build:
      context: ./services/data-governance-service
      dockerfile: Dockerfile
    container_name: mobility-data-governance-service
    ports:
      - "8300:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  compliance-reporting-service:
