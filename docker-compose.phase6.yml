# ==============================================
# Smart Mobility & Analytics Platform
# Phase 6: Advanced AI Overlay
# ==============================================
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.phase2.yml -f docker-compose.phase3.yml -f docker-compose.phase4.yml -f docker-compose.phase5.yml -f docker-compose.phase6.yml up -d
#
# This overlay adds:
#   - Elasticsearch (search & analytics engine)
#   - 14 Phase 6 Advanced AI microservices
#
# ==============================================

# -- Shared config for Phase 6 Python services --
x-phase6-python-service: &phase6-python-service
  restart: unless-stopped
  environment: &phase6-python-env
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: mobility_platform
    POSTGRES_USER: mobility
    POSTGRES_PASSWORD: mobility_dev_2024
    REDIS_HOST: redis
    REDIS_PORT: 6379
    JWT_SECRET_KEY: dev-secret-key-change-in-production
    JWT_ALGORITHM: HS256
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    SCHEMA_REGISTRY_URL: http://schema-registry:8081
    CLICKHOUSE_HOST: clickhouse
    CLICKHOUSE_PORT: 8123
    CLICKHOUSE_NATIVE_PORT: 9000
    CLICKHOUSE_DB: mobility_analytics
    CLICKHOUSE_USER: default
    CLICKHOUSE_PASSWORD: ""
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
    MLFLOW_TRACKING_URI: http://mlflow:5000
    MLFLOW_ARTIFACT_ROOT: s3://mlflow-artifacts
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin
    MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    PROMETHEUS_URL: http://prometheus:9090
    GRAFANA_URL: http://grafana:3333
    JAEGER_URL: http://jaeger:16686
    ELASTICSEARCH_URL: http://elasticsearch:9200
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  deploy:
    resources:
      limits:
        memory: 256M

services:

  # ══════════════════════════════════════════════
  # Infrastructure
  # ══════════════════════════════════════════════

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: mobility-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ══════════════════════════════════════════════
  # AI / ML Domain (6 services)
  # ══════════════════════════════════════════════

  eta-prediction-service:
    <<: *phase6-python-service
    build:
      context: ./services/eta-prediction-service
      dockerfile: Dockerfile
    container_name: mobility-eta-prediction-service
    working_dir: /app/services/eta-prediction-service/src
    ports:
      - "8200:8000"
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  demand-forecast-service:
