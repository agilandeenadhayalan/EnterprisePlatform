# ==============================================
# Smart Mobility & Analytics Platform
# Phase 2: Event-Driven Architecture Overlay
# ==============================================
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.phase2.yml up -d
#
# This overlay adds:
#   - Kafka (KRaft mode, no ZooKeeper)
#   - Schema Registry (Confluent)
#   - Kafka UI (Provectus)
#   - 49 Phase 2 microservices
#
# ==============================================

# ── Shared config for Phase 2 Python services ──
x-phase2-python-service: &phase2-python-service
  restart: unless-stopped
  environment: &phase2-python-env
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: mobility_platform
    POSTGRES_USER: mobility
    POSTGRES_PASSWORD: mobility_dev_2024
    REDIS_HOST: redis
    REDIS_PORT: 6379
    JWT_SECRET_KEY: dev-secret-key-change-in-production
    JWT_ALGORITHM: HS256
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    SCHEMA_REGISTRY_URL: http://schema-registry:8081
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy
  deploy:
    resources:
      limits:
        memory: 256M

services:
  # ══════════════════════════════════════════════
  # Phase 2 Infrastructure
  # ══════════════════════════════════════════════

  # ── Kafka (KRaft mode) ──
  # WHY: Event bus for domain events. KRaft eliminates ZooKeeper dependency
  # by using Kafka's built-in Raft consensus for metadata management.
  # ALTERNATIVE: RabbitMQ (simpler), Pulsar (multi-tenancy), Redpanda (C++)
  kafka:
    image: bitnami/kafka:3.7
    container_name: mobility-kafka
    restart: unless-stopped
    ports:
      - "29094:29094"    # External listener for host access
    environment:
      # KRaft mode (no ZooKeeper)
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Listeners
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Performance tuning
      KAFKA_CFG_NUM_PARTITIONS: 6
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_LOG_RETENTION_HOURS: 168       # 7 days
      KAFKA_CFG_LOG_SEGMENT_BYTES: 1073741824  # 1GB segments
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Schema Registry ──
  # WHY: Enforces event schema compatibility. Prevents breaking changes
  # when producer schemas evolve — consumers won't crash on unknown fields.
  # ALTERNATIVE: Apicurio Registry (OSS), AWS Glue Schema Registry
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: mobility-schema-registry
    restart: unless-stopped
    ports:
      - "8089:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Kafka UI ──
  # WHY: Visual monitoring for topics, consumer groups, and message flow.
  # Essential for debugging event-driven systems.
  # ALTERNATIVE: AKHQ, Conduktor, Redpanda Console
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: mobility-kafka-ui
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: mobility-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

