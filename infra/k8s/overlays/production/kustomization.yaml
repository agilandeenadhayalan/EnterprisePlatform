apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/infra
  - ../../base/services
  - pdb.yaml

commonLabels:
  environment: production

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: app
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: app
                resources:
                  limits:
                    memory: 512Mi
                    cpu: 500m
                env:
                  - name: LOG_LEVEL
                    value: warn
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=mobility-platform"
