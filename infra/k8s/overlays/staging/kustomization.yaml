apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/infra
  - ../../base/services

commonLabels:
  environment: staging

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: app
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: app
                resources:
                  limits:
                    memory: 256Mi
                    cpu: 250m
                env:
                  - name: LOG_LEVEL
                    value: info
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=mobility-platform"
