apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  labels:
    app: clickhouse
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: analytics-database
    app.kubernetes.io/part-of: mobility-platform
spec:
  type: ClusterIP
  selector:
    app: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
      protocol: TCP
    - name: native
      port: 9000
      targetPort: 9000
      protocol: TCP
