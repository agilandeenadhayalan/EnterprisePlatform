# ==============================================
# Smart Mobility & Analytics Platform
# Phase 3: Data Platform Overlay
# ==============================================
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.phase2.yml -f docker-compose.phase3.yml up -d
#
# This overlay adds:
#   - ClickHouse (column-oriented OLAP warehouse)
#   - MinIO (S3-compatible data lake)
#   - 27 Phase 3 data platform microservices
#
# ==============================================

# ── Shared config for Phase 3 Python services ──
x-phase3-python-service: &phase3-python-service
  restart: unless-stopped
  environment: &phase3-python-env
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: mobility_platform
    POSTGRES_USER: mobility
    POSTGRES_PASSWORD: mobility_dev_2024
    REDIS_HOST: redis
    REDIS_PORT: 6379
    JWT_SECRET_KEY: dev-secret-key-change-in-production
    JWT_ALGORITHM: HS256
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    SCHEMA_REGISTRY_URL: http://schema-registry:8081
    # Phase 3: ClickHouse
    CLICKHOUSE_HOST: clickhouse
    CLICKHOUSE_PORT: 8123
    CLICKHOUSE_NATIVE_PORT: 9000
    CLICKHOUSE_DB: mobility_analytics
    CLICKHOUSE_USER: default
    CLICKHOUSE_PASSWORD: ""
    # Phase 3: MinIO
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  deploy:
    resources:
      limits:
        memory: 256M

services:

  # ══════════════════════════════════════════════
  # Infrastructure
  # ══════════════════════════════════════════════

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: mobility-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"     # HTTP interface
      - "9000:9000"     # Native TCP interface
    environment:
      CLICKHOUSE_DB: mobility_analytics
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./infra/scripts/init-clickhouse.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  minio:
    image: minio/minio:latest
    container_name: mobility-minio
    restart: unless-stopped
    ports:
      - "9002:9000"     # S3 API (remapped — 9000 used by ClickHouse native)
      - "9003:9001"     # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  minio-init:
    image: minio/mc:latest
    container_name: mobility-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/mobility-bronze;
      mc mb --ignore-existing local/mobility-silver;
      mc mb --ignore-existing local/mobility-gold;
      mc mb --ignore-existing local/mobility-checkpoints;
      exit 0;
      "

  # ══════════════════════════════════════════════
  # Stream Processing Domain (8 services)
  # ══════════════════════════════════════════════

  stream-processor-rides:
