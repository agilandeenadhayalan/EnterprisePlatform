      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  bff-service:
    build:
      context: .
      dockerfile: services/bff-service/Dockerfile
    container_name: mobility-bff
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      USER_SERVICE_URL: http://user-service:8020
      PROFILE_SERVICE_URL: http://profile-service:8021
      PREFERENCES_SERVICE_URL: http://preferences-service:8024
      ACTIVITY_SERVICE_URL: http://activity-service:8023
      FEATURE_FLAG_SERVICE_URL: http://feature-flag-service:8031
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8002/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
    name: mobility-postgres-data
  redis_data:
    name: mobility-redis-data
  pgadmin_data:
    name: mobility-pgadmin-data
