# ==============================================
# Smart Mobility & Analytics Platform
# Phase 5: Infrastructure & DevOps Overlay
# ==============================================
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.phase2.yml -f docker-compose.phase3.yml -f docker-compose.phase4.yml -f docker-compose.phase5.yml up -d
#
# This overlay adds:
#   - Prometheus (metrics collection & alerting)
#   - Grafana (dashboards & visualization)
#   - Jaeger (distributed tracing)
#   - 9 Phase 5 Infrastructure & DevOps microservices
#
# ==============================================

# -- Shared config for Phase 5 Python services --
x-phase5-python-service: &phase5-python-service
  restart: unless-stopped
  environment: &phase5-python-env
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: mobility_platform
    POSTGRES_USER: mobility
    POSTGRES_PASSWORD: mobility_dev_2024
    REDIS_HOST: redis
    REDIS_PORT: 6379
    JWT_SECRET_KEY: dev-secret-key-change-in-production
    JWT_ALGORITHM: HS256
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    SCHEMA_REGISTRY_URL: http://schema-registry:8081
    CLICKHOUSE_HOST: clickhouse
    CLICKHOUSE_PORT: 8123
    CLICKHOUSE_NATIVE_PORT: 9000
    CLICKHOUSE_DB: mobility_analytics
    CLICKHOUSE_USER: default
    CLICKHOUSE_PASSWORD: ""
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
    MLFLOW_TRACKING_URI: http://mlflow:5000
    MLFLOW_ARTIFACT_ROOT: s3://mlflow-artifacts
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin
    MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    PROMETHEUS_URL: http://prometheus:9090
    GRAFANA_URL: http://grafana:3333
    JAEGER_URL: http://jaeger:16686
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  deploy:
    resources:
      limits:
        memory: 256M

services:

  # ══════════════════════════════════════════════
  # Infrastructure
  # ══════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: mobility-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:10.4.0
    container_name: mobility-grafana
    restart: unless-stopped
    ports:
      - "3333:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: mobility-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:14269/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  # ══════════════════════════════════════════════
  # Observability Domain (5 services)
  # ══════════════════════════════════════════════

  alerting-service:
    <<: *phase5-python-service
    build:
      context: ./services/alerting-service
      dockerfile: Dockerfile
    container_name: mobility-alerting-service
    ports:
      - "8190:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  health-check-service:
    <<: *phase5-python-service
    build:
      context: ./services/health-check-service
      dockerfile: Dockerfile
    container_name: mobility-health-check-service
    ports:
      - "8191:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
