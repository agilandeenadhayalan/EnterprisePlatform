      retries: 3
      start_period: 15s

  # ══════════════════════════════════════════════
  # DevOps Domain (4 services)
  # ══════════════════════════════════════════════

  deployment-service:
    <<: *phase5-python-service
    build:
      context: ./services/deployment-service
      dockerfile: Dockerfile
    container_name: mobility-deployment-service
    ports:
      - "8195:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  slo-tracker-service:
    <<: *phase5-python-service
    build:
      context: ./services/slo-tracker-service
      dockerfile: Dockerfile
    container_name: mobility-slo-tracker-service
    ports:
      - "8196:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
